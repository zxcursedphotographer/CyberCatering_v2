<!DOCTYPE html>
<html>
  <head>
    <title>Booleans</title>
  </head>
  <body>

    <script>
let age = 5; // Сюда мы пишем возраст ТОГО, КТО ПРИШЁЛ в парк. Сейчас пришёл 5-летний ребёнок.

if (age <= 6 || age >= 65) {
  // Перевожу для компьютера: "Если возраст меньше/равен 6 ИЛИ больше/равен 65"
  console.log("Discount!"); // Даём скидку!
} else {
  console.log("No discount"); // В любом другом случае (если ему от 7 до 64 лет) — скидки нет.
}

  
    </script>
  </body>
 </html>
